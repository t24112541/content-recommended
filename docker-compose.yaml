services:
  redis:
    container_name: cr-redis
    image: redis:latest
    entrypoint: redis-server --requirepass $REDIS_PASS --maxmemory 512mb --maxmemory-policy allkeys-lru
    networks:
      - default
    ports:
      - $REDIS_PORT:$REDIS_DOCKER_PORT
    restart: always

  postgres:
    container_name: cr-db
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: $DB_NAME
      POSTGRES_USER: $DB_USER
      POSTGRES_PASSWORD: $DB_PASSWORD
      PGDATA: /data/postgres
      TZ: $TIME_ZONE
    volumes:
      - /db/postgres:/data/postgres
    ports:
      - $DB_PORT:5432
    restart: always

volumes:
  db:
